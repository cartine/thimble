name: ci

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test:
    name: build-test
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race -coverprofile=coverage.out ./...

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        run: govulncheck ./...

  lint:
    name: staticcheck + gosec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - name: staticcheck
        run: staticcheck ./...
      - name: gosec
        # -tests=false skips test fixtures (which intentionally write
        # 0o700 fake `age` shell scripts and would otherwise trip G306).
        # G204 (subprocess) suppressions are inline at the four call
        # sites in internal/age and internal/cli, each justified.
        run: gosec -tests=false ./...
